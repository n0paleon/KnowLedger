<style>
    .auth-input {
        width: 100%;
        padding: 0.625rem 1rem 0.625rem 2.75rem;
        font-size: 0.875rem;
        background-color: #f9fafb;
        border: 1.5px solid #e5e7eb;
        border-radius: 0.625rem;
        color: #1f2937;
        transition: all 0.2s;
        outline: none;
        box-sizing: border-box;
    }
    .auth-input:focus {
        border-color: #6366f1;
        background-color: #ffffff;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
    }
    .auth-input::placeholder { color: #9ca3af; }
</style>

<div style="width:100%; max-width:420px;">

    <!-- Brand -->
    <div style="text-align:center; margin-bottom:2rem;">
        <div style="display:inline-flex; align-items:center; justify-content:center; width:64px; height:64px; background:linear-gradient(135deg,#6366f1,#4f46e5); border-radius:18px; box-shadow:0 8px 24px rgba(99,102,241,0.35); margin-bottom:1rem; transition:transform 0.3s; cursor:default;"
             onmouseenter="this.style.transform='rotate(8deg) scale(1.05)'"
             onmouseleave="this.style.transform='rotate(0deg) scale(1)'">
            <span style="font-size:1.875rem;">💡</span>
        </div>
        <h1 style="font-size:1.625rem; font-weight:800; color:#3730a3; letter-spacing:-0.03em; margin:0;">KnowLedger</h1>
        <p style="font-size:0.65rem; color:#a5b4fc; text-transform:uppercase; letter-spacing:0.2em; font-weight:600; margin-top:2px;">Journal</p>
    </div>

    <!-- Card -->
    <div style="background:#fff; border-radius:20px; box-shadow:0 4px 6px rgba(0,0,0,0.04), 0 20px 60px rgba(99,102,241,0.1); border:1px solid rgba(99,102,241,0.1); padding:2.5rem 2rem;">

        <div style="margin-bottom:1.75rem;">
            <h2 style="font-size:1.25rem; font-weight:700; color:#1e1b4b; margin:0 0 4px 0;">Welcome back 👋</h2>
            <p style="font-size:0.8125rem; color:#9ca3af; margin:0;">Sign in to your account to continue</p>
        </div>

        <!-- Error (aktifkan dari Pongo2 jika ada flash message) -->
        {% if Error %}
        <div style="display:flex; align-items:center; gap:8px; background:#fef2f2; border:1px solid #fecaca; color:#dc2626; font-size:0.8125rem; padding:0.75rem 1rem; border-radius:10px; margin-bottom:1.25rem;">
            <svg style="width:16px;height:16px;flex-shrink:0;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span>{{ Error }}</span>
        </div>
        {% endif %}

        <form method="POST" action="" style="display:flex; flex-direction:column; gap:1.125rem;">

            <!-- Username -->
            <div>
                <label for="username" style="display:block; font-size:0.8125rem; font-weight:600; color:#374151; margin-bottom:0.375rem;">Username</label>
                <div style="position:relative;">
                    <svg style="position:absolute; left:0.875rem; top:50%; transform:translateY(-50%); width:1rem; height:1rem; color:#9ca3af; pointer-events:none;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    <input type="text" id="username" name="username" required autofocus autocomplete="username" placeholder="Enter your username" class="auth-input"/>
                </div>
            </div>

            <!-- Password -->
            <div>
                <label for="password" style="display:block; font-size:0.8125rem; font-weight:600; color:#374151; margin-bottom:0.375rem;">Password</label>
                <div style="position:relative;">
                    <svg style="position:absolute; left:0.875rem; top:50%; transform:translateY(-50%); width:1rem; height:1rem; color:#9ca3af; pointer-events:none;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password" class="auth-input" style="padding-right:2.75rem;"/>
                    <button type="button" onclick="togglePassword()"
                            style="position:absolute; right:0.875rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#9ca3af; padding:0; display:flex; align-items:center; transition:color 0.2s;"
                            onmouseenter="this.style.color='#6366f1'" onmouseleave="this.style.color='#9ca3af'">
                        <svg id="eyeIcon" style="width:1rem;height:1rem;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit"
                    style="width:100%; display:flex; align-items:center; justify-content:center; gap:0.5rem; background:linear-gradient(135deg,#6366f1,#4f46e5); color:white; font-weight:700; font-size:0.9375rem; padding:0.8125rem 1.5rem; border-radius:12px; border:none; cursor:pointer; box-shadow:0 4px 14px rgba(99,102,241,0.35); transition:all 0.2s; margin-top:0.375rem;"
                    onmouseenter="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 20px rgba(99,102,241,0.45)';"
                    onmouseleave="this.style.transform='translateY(0)';this.style.boxShadow='0 4px 14px rgba(99,102,241,0.35)';">
                <svg style="width:1rem;height:1rem;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                </svg>
                Sign In
            </button>

        </form>
    </div>

    <p style="text-align:center; font-size:0.75rem; color:#c7d2fe; margin-top:1.5rem;">&copy; 2026 KnowLedger</p>
</div>

<script>
    function togglePassword() {
        const input = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        icon.innerHTML = isHidden
            ? `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`
            : `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
    }
</script>
