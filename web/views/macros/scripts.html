{% macro factDetailsScript() export %}

<script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>

<script>
    (function () {

        const quill = new Quill('#quill-editor', {
            theme: 'snow',
            placeholder: 'Write something mind-blowing...',
            modules: {
                toolbar: [
                    ['bold', 'italic'],
                    ['blockquote'],
                    [{ 'header': [1, 2, 3, false] }],
                    [],
                    ['clean']
                ]
            }
        })

        const hiddenTextarea = document.getElementById('content')

        const charCount = document.getElementById('charCount')

        function updateCharCount() {
            const len = quill.getText().trim().length
            charCount.textContent = `${len} chars`
            charCount.className = len > 500
                ? 'text-xs font-mono text-red-400'
                : len > 300
                    ? 'text-xs font-mono text-amber-400'
                    : 'text-xs font-mono text-gray-400'
        }
        quill.on('text-change', updateCharCount)
        updateCharCount()

        document.getElementById('mainForm').addEventListener('submit', function (e) {
            const html = quill.root.innerHTML
            const text = quill.getText().trim()

            if (!text) {
                e.preventDefault()
                quill.focus()
                quill.root.style.borderColor = '#f87171'
                quill.root.style.boxShadow   = '0 0 0 2px rgba(248,113,113,0.3)'
                setTimeout(() => {
                    quill.root.style.borderColor = ''
                    quill.root.style.boxShadow   = ''
                }, 2500)
                return
            }

            hiddenTextarea.value = html
        })

        // --- Tag preview ---
        const tagsInput  = document.getElementById('tagsInput')
        const tagPreview = document.getElementById('tagPreview')

        function updateTagPreview() {
            tagPreview.innerHTML = ''
            tagsInput.value.split(',').forEach(tag => {
                const trimmed = tag.trim()
                if (!trimmed) return
                const span = document.createElement('span')
                span.className = 'text-xs bg-amber-50 text-amber-600 border border-amber-200 px-2 py-1 rounded font-medium'
                span.textContent = '#' + trimmed
                tagPreview.appendChild(span)
            })
        }
        tagsInput.addEventListener('input', updateTagPreview)
        updateTagPreview()

        // --- Tag Autocomplete ---
        const tagsWrapper = tagsInput.parentElement
        let activeSuggestionIndex = -1

        const dropdown = document.createElement('div')
        dropdown.id        = 'tagDropdown'
        dropdown.className = 'absolute z-50 w-full bg-white border border-gray-200 rounded-lg shadow-lg mt-1 hidden max-h-48 overflow-y-auto'
        tagsWrapper.style.position = 'relative'
        tagsWrapper.appendChild(dropdown)

        function getCurrentTag() {
            const parts = tagsInput.value.split(',')
            return parts[parts.length - 1].trim()
        }

        function replaceCurrentTag(suggestion) {
            const parts = tagsInput.value.split(',')
            parts[parts.length - 1] = ' ' + suggestion
            tagsInput.value = parts.join(',') + ', '
            hideDropdown()
            updateTagPreview()
            tagsInput.focus()
        }

        function hideDropdown() {
            dropdown.classList.add('hidden')
            dropdown.innerHTML = ''
            activeSuggestionIndex = -1
        }

        function renderDropdown(suggestions) {
            dropdown.innerHTML = ''
            if (!suggestions.length) { hideDropdown(); return }

            suggestions.forEach((s) => {
                const item = document.createElement('div')
                item.className = 'px-4 py-2 text-sm text-gray-700 cursor-pointer hover:bg-indigo-50 hover:text-indigo-600'
                item.textContent = '#' + s
                item.addEventListener('mousedown', (e) => {
                    e.preventDefault()
                    replaceCurrentTag(s)
                })
                dropdown.appendChild(item)
            })

            dropdown.classList.remove('hidden')
        }

        function highlightSuggestion(index) {
            const items = dropdown.querySelectorAll('div')
            items.forEach((el, i) => {
                el.classList.toggle('bg-indigo-50', i === index)
                el.classList.toggle('text-indigo-600', i === index)
            })
        }

        let debounceTimer = null

        tagsInput.addEventListener('input', () => {
            const q = getCurrentTag()
            clearTimeout(debounceTimer)
            if (q.length < 1) { hideDropdown(); return }

            debounceTimer = setTimeout(async () => {
                try {
                    const res  = await fetch(`/admin/api/tags/suggestions?q=${encodeURIComponent(q)}`)
                    const tags = await res.json()
                    const existing = tagsInput.value.split(',').map(t => t.trim().toLowerCase())
                    const filtered = tags.filter(t => !existing.slice(0, -1).includes(t.toLowerCase()))
                    renderDropdown(filtered)
                } catch {
                    hideDropdown()
                }
            }, 200)
        })

        tagsInput.addEventListener('keydown', (e) => {
            const items = dropdown.querySelectorAll('div')
            if (!items.length) return

            if (e.key === 'ArrowDown') {
                e.preventDefault()
                activeSuggestionIndex = Math.min(activeSuggestionIndex + 1, items.length - 1)
                highlightSuggestion(activeSuggestionIndex)
            } else if (e.key === 'ArrowUp') {
                e.preventDefault()
                activeSuggestionIndex = Math.max(activeSuggestionIndex - 1, 0)
                highlightSuggestion(activeSuggestionIndex)
            } else if (e.key === 'Enter' || e.key === 'Tab') {
                if (activeSuggestionIndex >= 0) {
                    e.preventDefault()
                    replaceCurrentTag(items[activeSuggestionIndex].textContent.replace('#', ''))
                }
            } else if (e.key === 'Escape') {
                hideDropdown()
            }
        })

        tagsInput.addEventListener('blur', () => {
            setTimeout(hideDropdown, 150)
        })

        // --- Media dropzone ---
        const mediaDropzone = document.getElementById('mediaDropzone')
        if (!mediaDropzone) return

        const fileInput      = document.getElementById('mediaFile')
        const mediaKeyInput  = document.getElementById('mediaKey')
        const submitBtn      = document.getElementById('submitBtn')
        const stateIdle      = document.getElementById('dropzoneIdle')
        const stateUploading = document.getElementById('dropzoneUploading')
        const stateSuccess   = document.getElementById('dropzoneSuccess')
        const stateError     = document.getElementById('dropzoneError')
        const successName    = document.getElementById('dropzoneSuccessName')
        const errorMsg       = document.getElementById('dropzoneErrorMsg')
        const removeBtn      = document.getElementById('mediaRemoveBtn')
        const retryBtn       = document.getElementById('mediaRetryBtn')

        function showState(state) {
            [stateIdle, stateUploading, stateSuccess, stateError].forEach(s => s.classList.add('hidden'))
            state.classList.remove('hidden')
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B'
            const k     = 1024
            const sizes = ['B', 'KB', 'MB', 'GB']
            const i     = Math.floor(Math.log(bytes) / Math.log(k))
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i]
        }

        function renderPreview(file, url) {
            const existing = document.getElementById('mediaPreview')
            if (existing) existing.remove()

            const wrapper     = document.createElement('div')
            wrapper.id        = 'mediaPreview'
            wrapper.className = 'rounded-lg overflow-hidden border border-gray-200 bg-gray-50'

            const type      = file.type || ''
            const nameShort = truncateChars(file.name || '', 20)
            const sizeText  = file.size ? formatBytes(file.size) : ''

            let mediaEl = ''
            if (type.startsWith('image/')) {
                mediaEl = `<img src="${url}" alt="${nameShort}" class="w-full max-h-64 object-contain bg-gray-100"/>`
            } else if (type.startsWith('video/')) {
                mediaEl = `<video controls class="w-full max-h-64 bg-black"><source src="${url}" type="${type}"/></video>`
            } else if (type.startsWith('audio/')) {
                mediaEl = `<div class="p-4"><audio controls class="w-full"><source src="${url}" type="${type}"/></audio></div>`
            } else {
                mediaEl = `
                <div class="flex items-center gap-3 p-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-gray-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    <div class="min-w-0">
                        <p class="text-sm text-gray-700 font-medium">${nameShort}</p>
                        <p class="text-xs text-gray-400">${type}</p>
                    </div>
                </div>`
            }

            wrapper.innerHTML = `
                ${mediaEl}
                <div class="px-3 py-2 border-t border-gray-200 bg-white flex items-center justify-between gap-2">
                    <p class="text-xs text-gray-400">${nameShort}${sizeText ? ' · ' + sizeText : ''}</p>
                    <a href="${url}" target="_blank" class="text-xs text-indigo-500 hover:text-indigo-700 hover:underline flex-shrink-0">Open ↗</a>
                </div>`

            fileInput.parentNode.insertBefore(wrapper, fileInput)
        }

        function removePreview() {
            const preview = document.getElementById('mediaPreview')
            if (preview) preview.remove()
        }

        let objectUrl = null

        async function uploadFile(file) {
            if (objectUrl) URL.revokeObjectURL(objectUrl)
            objectUrl = URL.createObjectURL(file)
            renderPreview(file, objectUrl)

            showState(stateUploading)
            submitBtn.disabled = true

            const formData = new FormData()
            formData.append('media', file)

            try {
                const res  = await fetch('/admin/api/media', { method: 'POST', body: formData })
                const json = await res.json()
                if (!res.ok) throw new Error(json.error || 'Upload failed')

                URL.revokeObjectURL(objectUrl)
                objectUrl = null

                renderPreview(
                    { name: json.key, type: file.type, size: json.size },
                    json.url
                )

                mediaKeyInput.value     = json.key
                successName.textContent = truncateChars(json.key, 20)
                showState(stateSuccess)
            } catch (err) {
                mediaKeyInput.value  = ''
                errorMsg.textContent = err.message
                removePreview()
                showState(stateError)
            } finally {
                submitBtn.disabled = false
            }
        }

        function resetMedia() {
            mediaKeyInput.value = ''
            fileInput.value     = ''
            if (objectUrl) {
                URL.revokeObjectURL(objectUrl)
                objectUrl = null
            }
            removePreview()
            showState(stateIdle)
        }

        mediaDropzone.addEventListener('click', (e) => {
            if (e.target.closest('button')) return
            fileInput.click()
        })

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) uploadFile(fileInput.files[0])
        })

        mediaDropzone.addEventListener('dragover', (e) => {
            e.preventDefault()
            mediaDropzone.classList.add('border-indigo-400', 'bg-indigo-50/40')
        })

        mediaDropzone.addEventListener('dragleave', () => {
            mediaDropzone.classList.remove('border-indigo-400', 'bg-indigo-50/40')
        })

        mediaDropzone.addEventListener('drop', (e) => {
            e.preventDefault()
            mediaDropzone.classList.remove('border-indigo-400', 'bg-indigo-50/40')
            const file = e.dataTransfer.files[0]
            if (file) uploadFile(file)
        })

        removeBtn.addEventListener('click', resetMedia)
        retryBtn.addEventListener('click', () => { resetMedia(); fileInput.click() })
    })()
</script>
{% endmacro %}

{% macro paginationScript(currentPage, totalPages) export %}
<script>
    const currentPage = {{ currentPage }};
    const totalPages  = {{ totalPages }};

    const btnPrev = document.getElementById('btnPrev');
    const btnNext = document.getElementById('btnNext');

    if (currentPage <= 1)          btnPrev.disabled = true;
    if (currentPage >= totalPages) btnNext.disabled = true;

    function getFilterParams() {
        const form = document.getElementById('filterForm');
        const params = new URLSearchParams(new FormData(form));
        params.delete('page');
        return params;
    }

    function nextPage() {
        if (currentPage < totalPages) {
            const params = getFilterParams();
            params.set('page', currentPage + 1);
            window.location.search = params.toString();
        }
    }

    function prevPage() {
        if (currentPage > 1) {
            const params = getFilterParams();
            params.set('page', currentPage - 1);
            window.location.search = params.toString();
        }
    }

    document.getElementById('filterForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const params = getFilterParams();
        params.set('page', '1');
        window.location.search = params.toString();
    });
</script>
{% endmacro %}
